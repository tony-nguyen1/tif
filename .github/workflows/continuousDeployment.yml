name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump-git-version:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: needed for tags + history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install semantic-release
        run: |
          npm install --no-save semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/git

      - name: Run semantic-release
        working-directory: app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
  bump-dockerhub-version:
    runs-on: ubuntu-latest
    needs: [bump-version]

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and tag Docker image
        run: |
          docker pull nemless/nyx:${{ github.sha }}
          docker tag nemless/nyx:${{ github.sha }} nemless/nyx:latest

      - name: Push latest tag
        run: |
          docker push nemless/nyx:latest
      - name: Creating release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            # ... todo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  deploy:
    runs-on: ubuntu-latest
    needs: [release]
    environment: production
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - name: Add deployment SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config

      - name: Generate .env.production
        env:
          APP_VERSION: ${{ needs.getlatestTag.outputs.APP_VERSION }}
          COMMIT_SHA: ${{ needs.getlatestTag.outputs.COMMIT_SHA }}
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.production
          echo "DATABASE_AUTH_TOKEN=${{ secrets.DATABASE_AUTH_TOKEN }}" >> .env.production
          # echo "DATABASE_REPLICA=${{ secrets.DATABASE_REPLICA }}" >> .env.production
          # echo "DATABASE_SYNC=${{ secrets.DATABASE_SYNC }}" >> .env.production

          echo "APP_ENV=${{ vars.APP_ENV }}" >> .env

          echo "BUILD_DATE=$(date -u +"%Y-%m-%d")" >> .env.production
          echo "APP_VERSION=$APP_VERSION" >> .env.production
          echo "COMMIT_SHA=$COMMIT_SHA" >> .env.production

      - name: Upload Docker compose file to server
        run: rsync -az --progress -e ssh ./docker-compose.test.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/github_actions/nyx/app/
      - name: Upload .env.production file to server
        run: rsync -az --progress -e ssh ./.env.production ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/github_actions/nyx/app/
      - name: Upload .env file to server
        run: rsync -az --progress -e ssh ./.env.production ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/github_actions/nyx/app/

      - name: Download latest image from Docker Hub
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ~/github_actions/nyx/app sudo docker compose -f docker-compose.yml -f docker-compose.production.yml up && docker pull nemless/nyx:latest"

      - name: Start the server
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ~/github_actions/nyx/app && sudo docker compose -f docker-compose.yml -f docker-compose.production.yml up"
