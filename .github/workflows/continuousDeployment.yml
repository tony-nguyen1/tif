name: Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-pipeline
  cancel-in-progress: false

env:
  IMAGE_NAME: nemless/nyx

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check

  unit-tests:
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - run: npx vitest run --reporter=default --run

  # Runs in parallel with lint / unit-tests — no reason to wait on cheap
  # checks before kicking off the expensive part.
  build:
    runs-on: ubuntu-latest
    environment: test
    outputs:
      image: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push immutable, sha-tagged image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: app
          push: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # This is the ONLY docker build in the whole pipeline. Everything
      # downstream tests or retags this exact digest.

  e2e:
    runs-on: ubuntu-latest
    needs: [build, lint, unit-tests]
    environment: test
    env:
      CI: true
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull the image under test (built once, in the build job)
        run: docker pull ${{ needs.build.outputs.image }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Generate .env
        run: echo "HOST_PORT=${{ vars.HOST_PORT }}" >> .env
      - name: Generate .env.test
        run: |
          echo "DATABASE_URL=${{ vars.DATABASE_URL }}" >> .env.test
          echo "APP_ENV=${{ vars.APP_ENV }}" >> .env.test
      # NOTE: assumes docker-compose.yml resolves the image via an
      # IMAGE_TAG env var, e.g. `image: ${IMAGE_NAME}:${IMAGE_TAG}`.
      # If it currently hardcodes a tag, it needs to be parameterized
      # for this "test the exact built image" step to actually work.
      - name: Start app
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml --env-file .env.test up -d
      - name: Cache Playwright browsers
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run e2e tests
        run: npm run test:e2e:ci
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml --env-file .env.test down

  release:
    runs-on: ubuntu-latest
    needs: [e2e]
    permissions:
      contents: write
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for tags + history
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # Using the community action instead of raw `npx semantic-release`
      # so the new version + whether-a-release-happened are structured outputs
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          working_directory: app
          extra_plugins: |
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # NOTE: app's .releaserc needs @semantic-release/github in its
      # plugins list — that's what tags AND creates the GitHub release,
      # replacing the separate softprops/action-gh-release step. Also
      # confirm app/package.json has "private": true, or the default
      # @semantic-release/npm plugin will attempt a real npm publish.

  # Only runs if semantic-release actually cut a release. A commit that
  # doesn't warrant a version bump (docs/chore) should deploy nothing.
  promote-image:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: needs.release.outputs.published == 'true'
    environment: test
    steps:
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Retag the tested digest as latest + semver (registry-side, no rebuild, no re-pull)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }} \
            ${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}

  deploy:
    runs-on: ubuntu-latest
    needs: [release, promote-image]
    if: needs.release.outputs.published == 'true'
    environment: production
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
      - name: Generate .env.production
        env:
          APP_VERSION: ${{ needs.release.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.production
          echo "DATABASE_AUTH_TOKEN=${{ secrets.DATABASE_AUTH_TOKEN }}" >> .env.production
          # echo "DATABASE_REPLICA=${{ secrets.DATABASE_REPLICA }}" >> .env.production
          # echo "DATABASE_SYNC=${{ secrets.DATABASE_SYNC }}" >> .env.production
          echo "APP_ENV=${{ vars.APP_ENV }}" >> .env.production
          echo "BUILD_DATE=$(date -u +"%Y-%m-%d")" >> .env.production
          echo "APP_VERSION=$APP_VERSION" >> .env.production
          echo "COMMIT_SHA=$COMMIT_SHA" >> .env.production
      - name: Generate .env
        run: |
          echo "HOST_PORT=${{ vars.HOST_PORT }}" >> .env
      - name: Upload compose files to server
        run: |
          rsync -az -e ssh ./docker-compose.yml ./docker-compose.production.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/github_actions/nyx/
      - name: Upload .env.production to server
        run: rsync -az -e ssh ./.env.production ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/github_actions/nyx/
      - name: Upload .env to server
        run: rsync -az -e ssh ./.env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/github_actions/nyx/
      - name: Pull the released image on the server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/github_actions/nyx/ && IMAGE_TAG=${{ needs.release.outputs.version }} sudo docker compose -f docker-compose.yml -f docker-compose.production.yml pull"
      - name: Recreate containers on the server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/github_actions/nyx/ && IMAGE_TAG=${{ needs.release.outputs.version }} sudo docker compose -f docker-compose.yml -f docker-compose.production.yml up -d"
