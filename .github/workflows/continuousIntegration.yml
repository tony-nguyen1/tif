name: Continuous Integration
on:
  push:
    branches-ignore:
      - "main"
  workflow_dispatch:

env:
  IMAGE_NAME: nemless/nyx

jobs:
  lint:
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check

  unit-tests:
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - run: npx vitest run --reporter=default --run

  # Runs in parallel with lint / unit-tests — no reason to wait on cheap
  # checks before kicking off the expensive part.
  build:
    runs-on: ubuntu-latest
    environment: test
    outputs:
      image: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push immutable, sha-tagged image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: app
          push: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # This is the ONLY docker build in the whole pipeline. Everything
      # downstream tests or retags this exact digest.

  e2e:
    runs-on: ubuntu-latest
    needs: [build, lint, unit-tests]
    environment: test
    env:
      CI: true
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull the image under test (built once, in the build job)
        run: docker pull ${{ needs.build.outputs.image }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Generate .env
        run: echo "HOST_PORT=${{ vars.HOST_PORT }}" >> .env
      - name: Generate .env.test
        run: |
          echo "DATABASE_URL=${{ vars.DATABASE_URL }}" >> .env.test
          echo "APP_ENV=${{ vars.APP_ENV }}" >> .env.test
      # NOTE: assumes docker-compose.yml resolves the image via an
      # IMAGE_TAG env var, e.g. `image: ${IMAGE_NAME}:${IMAGE_TAG}`.
      # If it currently hardcodes a tag, it needs to be parameterized
      # for this "test the exact built image" step to actually work.
      - name: Start app
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml --env-file .env.test up -d
      - name: Cache Playwright browsers
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run e2e tests
        run: npm run test:e2e:ci
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml --env-file .env.test down
