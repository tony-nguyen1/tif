name: Continuous Integration
on:
  push:
    branches-ignore:
      - "main"
  workflow_dispatch:
jobs:
  verification:
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - name: Sanity check
        run: pwd
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Running linter and code formatter
        run: npm run lint
      - name: Check
        run: npm run check
  test-fast:
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run unit tests
        run: npx vitest run --reporter=default --run
  test-e2e:
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: app
    needs: [verification, test-fast]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate .env file
        run: |
          echo "HOST_PORT=${{ vars.HOST_PORT }}" >> .env
      - name: Generate .env.test file
        run: |
          echo "DATABASE_URL=${{ vars.DATABASE_URL }}" >> .env.test
          echo "APP_ENV=${{ vars.APP_ENV }}" >> .env.test
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Build Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: app # explicit path required here
          push: false
          load: true
          tags: nemless/nyx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sanity check of the config
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml config
      - name: Start app
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
      - name: Cache Playwright browsers
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run e2e tests
        run: npm run test:e2e:ci
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml --env-file .env.test down
